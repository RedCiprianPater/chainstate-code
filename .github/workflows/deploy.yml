name: Deploy to HF Space (ornith-chainstate)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git push -f "https://CPater:${HF_TOKEN}@huggingface.co/spaces/CPater/ornith-chainstate" main
